<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PSYCHON — Signal Console</title>
    <!-- Markdown & Highlight -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ==========================================================
           TOKENS — instrument-panel palette. Two accents only:
           phosphor amber (signal / self) and signal teal (system).
           ========================================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --void: #07090c;
            --void-2: #0c1015;
            --panel: #10141a;
            --panel-hi: #151a21;
            --line: rgba(255, 255, 255, 0.09);
            --line-soft: rgba(255, 255, 255, 0.05);

            --phosphor: #ffb545;
            --phosphor-dim: rgba(255, 181, 69, 0.32);
            --teal: #5be0e6;
            --teal-dim: rgba(91, 224, 230, 0.28);
            --alert: #ff6b6b;

            --text: #e9edf2;
            --muted: #7c8794;
            --muted-2: #4d5560;

            --radius: 10px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --drawer-width: 280px;
        }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: var(--void);
            background-image:
                radial-gradient(ellipse 900px 500px at 8% 0%, rgba(91, 224, 230, 0.07), transparent 60%),
                radial-gradient(ellipse 900px 600px at 95% 100%, rgba(255, 181, 69, 0.06), transparent 60%);
            min-height: 100dvh;
            position: relative;
        }
        /* faint graph-paper grid — the instrument's "bench" */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 34px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 34px);
            mask-image: radial-gradient(ellipse 80% 70% at 50% 40%, black 40%, transparent 90%);
        }

        #neuralCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .shell {
            position: relative;
            z-index: 1;
            height: 100dvh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
        }
        @media (max-width: 820px) { .shell { padding: 0; } }

        .console {
            width: 100%;
            max-width: 1180px;
            height: min(860px, 92dvh);
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 100%;
            background: linear-gradient(180deg, rgba(16, 20, 26, 0.88), rgba(12, 16, 21, 0.92));
            border: 1px solid var(--line);
            border-radius: 16px;
            backdrop-filter: blur(18px) saturate(120%);
            -webkit-backdrop-filter: blur(18px) saturate(120%);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            overflow: hidden;
            position: relative;
        }
        @media (max-width: 820px) {
            .console { grid-template-columns: 1fr; border-radius: 0; height: 100dvh; max-height: 100dvh; }
        }

        /* ----- RAIL (desktop) ----- */
        .rail {
            padding: 24px 20px;
            border-right: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(91, 224, 230, 0.035), transparent 40%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
            overflow: hidden;
        }
        @media (max-width: 820px) { .rail { display: none; } }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-mark {
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            position: relative;
        }
        .brand-mark::after {
            content: "";
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1px solid var(--phosphor-dim);
            animation: ping 2.6s ease-out infinite;
        }
        @keyframes ping {
            0% { transform: scale(0.72); opacity: 0.9; }
            100% { transform: scale(1.35); opacity: 0; }
        }
        .brand h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: var(--text);
        }
        .brand .tagline {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
            margin-top: 3px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.5px;
            color: var(--teal);
            padding: 7px 11px;
            border-radius: 999px;
            background: rgba(91, 224, 230, 0.06);
            border: 1px solid var(--teal-dim);
            width: fit-content;
        }
        .dot-live {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--teal);
            box-shadow: 0 0 8px var(--teal);
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.75); }
        }

        .topic-section { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .rail-section-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted-2);
            margin: 2px 0 8px;
        }
        .topic-grid { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; padding-right: 4px; flex: 1; min-height: 0; }
        .topic-grid::-webkit-scrollbar { width: 4px; }
        .topic-grid::-webkit-scrollbar-thumb { background: rgba(91, 224, 230, 0.25); border-radius: 10px; }

        .topic-btn {
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: var(--text);
            background: transparent;
            border: 1px solid transparent;
            border-left: 2px solid transparent;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .18s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            -webkit-tap-highlight-color: transparent;
        }
        .topic-btn:hover {
            background: rgba(255, 255, 255, 0.035);
            border-left-color: var(--phosphor);
            transform: translateX(2px);
        }
        .topic-btn .ch {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted-2);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--line);
            padding: 2px 5px;
            border-radius: 4px;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }

        .rail-footer { margin-top: auto; display: flex; gap: 8px; }
        .icon-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--line);
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all .18s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .icon-btn:hover { color: var(--text); border-color: var(--teal-dim); background: rgba(91, 224, 230, 0.05); }

        /* ----- CHAT COLUMN ----- */
        .chat-col {
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            height: 100%;
            width: 100%;
            position: relative;
            background: rgba(7, 9, 12, 0.35);
        }

        .chat-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: rgba(10, 13, 17, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            gap: 8px;
            flex-wrap: wrap;
            min-height: 56px;
            position: relative;
            overflow: hidden;
        }
        #pulseCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0.55;
            pointer-events: none;
        }
        .chat-header .who { display: flex; align-items: center; gap: 10px; position: relative; z-index: 1; }
        .avatar-bot {
            width: 34px;
            height: 34px;
            border-radius: 7px;
            background: var(--panel-hi);
            border: 1px solid var(--teal-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 700;
            color: var(--teal);
            flex-shrink: 0;
        }
        .who-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
        }
        .who-sub { font-size: 11px; color: var(--muted); display: block; line-height: 1.2; }
        .msg-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line);
            padding: 4px 10px;
            border-radius: 999px;
            white-space: nowrap;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            -webkit-tap-highlight-color: transparent;
            line-height: 1;
            position: relative;
            z-index: 1;
        }
        @media (max-width: 820px) { .hamburger { display: block; } }

        /* ----- DRAWER ----- */
        .drawer-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .drawer-overlay.open { opacity: 1; pointer-events: auto; }
        .drawer-content {
            position: fixed; top: 0; left: 0;
            width: var(--drawer-width); max-width: 80%; height: 100%;
            background: rgba(9, 12, 16, 0.97);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--line);
            z-index: 1001;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 26px 18px;
            display: flex; flex-direction: column; gap: 22px;
            overflow-y: auto;
        }
        .drawer-content.open { transform: translateX(0); }
        .drawer-close {
            align-self: flex-end; background: none; border: none;
            color: var(--muted); font-size: 26px; cursor: pointer; padding: 0 4px;
            -webkit-tap-highlight-color: transparent;
        }
        .drawer-content .brand { margin-bottom: 2px; }
        .drawer-content .topic-grid { flex: 1; overflow-y: auto; gap: 4px; }
        .drawer-content .topic-btn { font-size: 14px; padding: 10px 10px; }
        .drawer-content .rail-footer { margin-top: auto; flex-direction: column; gap: 6px; }
        .drawer-content .rail-footer .icon-btn { width: 100%; }

        /* ----- MESSAGES ----- */
        #messages {
            flex: 1 1 auto; min-height: 0; overflow-y: auto;
            padding: 16px 16px 8px 16px;
            display: flex; flex-direction: column; gap: 14px;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(91, 224, 230, 0.25); border-radius: 10px; }

        .row { display: flex; gap: 10px; max-width: 86%; animation: rise .3s ease both; position: relative; }
        @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .row.user { align-self: flex-end; flex-direction: row-reverse; }
        .row .avatar-mini {
            width: 26px; height: 26px; border-radius: 6px; flex: none;
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; font-weight: 700;
            margin-top: 2px;
        }
        .row.bot .avatar-mini { background: var(--panel-hi); border: 1px solid var(--teal-dim); color: var(--teal); }
        .row.user .avatar-mini { background: rgba(255, 181, 69, 0.12); border: 1px solid var(--phosphor-dim); color: var(--phosphor); }

        .bubble {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            position: relative;
        }
        .bubble code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255, 255, 255, 0.07);
            padding: 2px 6px; border-radius: 4px; font-size: 0.9em;
        }
        .bubble pre { margin: 8px 0; padding: 12px; border-radius: 6px; overflow-x: auto; background: rgba(0, 0, 0, 0.45); border: 1px solid var(--line-soft); }
        .bubble pre code { background: transparent; padding: 0; font-size: 13px; }

        .row.bot .bubble {
            background: var(--panel);
            border: 1px solid var(--line);
            border-left: 2px solid var(--teal-dim);
            border-top-left-radius: 3px;
        }
        .row.user .bubble {
            background: linear-gradient(135deg, rgba(255, 181, 69, 0.95), rgba(255, 154, 61, 0.85));
            color: #1a0f04;
            font-weight: 500;
            border-top-right-radius: 3px;
        }
        .row.user .bubble code { background: rgba(0, 0, 0, 0.15); color: #1a0f04; }
        .row.user .bubble pre { background: rgba(0, 0, 0, 0.2); }

        .meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted-2);
            margin-top: 4px;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .row.user .meta { justify-content: flex-end; color: rgba(45, 26, 5, 0.55); }
        .msg-actions { display: inline-flex; gap: 6px; margin-left: auto; }
        .msg-actions button {
            background: none; border: none; color: var(--muted); cursor: pointer;
            font-size: 12px; padding: 0 2px; transition: color 0.2s; opacity: 0.55;
            -webkit-tap-highlight-color: transparent;
        }
        .msg-actions button:hover { color: var(--teal); opacity: 1; }
        .row.user .msg-actions button { color: rgba(45, 26, 5, 0.5); }
        .row.user .msg-actions button:hover { color: rgba(45, 26, 5, 0.85); }

        .typing { display: flex; align-items: center; gap: 8px; padding: 12px 14px; }
        .typing .dots { display: flex; gap: 4px; }
        .typing span {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--teal);
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: .15s; }
        .typing span:nth-child(3) { animation-delay: .3s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: .4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }
        .typing .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            color: var(--muted);
            letter-spacing: 0.5px;
        }

        /* ----- CHIP ROW ----- */
        #chipRow {
            display: flex; gap: 8px; flex-wrap: nowrap; overflow-x: auto;
            padding: 6px 16px 10px 16px; flex-shrink: 0;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
            background: rgba(7, 9, 12, 0.2);
            border-top: 1px solid var(--line-soft);
            min-height: 46px; align-items: center;
        }
        #chipRow::-webkit-scrollbar { display: none; }
        .chip {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--teal);
            background: rgba(91, 224, 230, 0.06);
            border: 1px solid var(--teal-dim);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all .18s ease;
            white-space: nowrap;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .chip::before { content: "› "; opacity: 0.6; }
        .chip:active { background: rgba(91, 224, 230, 0.16); transform: scale(0.97); border-color: var(--teal); }

        /* ----- INPUT BAR ----- */
        .input-bar {
            padding: 10px 16px calc(10px + var(--safe-bottom));
            display: flex; gap: 10px; align-items: center; flex-shrink: 0;
            border-top: 1px solid var(--line);
            background: rgba(10, 13, 17, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .input-wrap {
            flex: 1; position: relative; border-radius: 8px; padding: 1.5px;
            background: var(--line);
            transition: background .25s ease;
            display: flex; align-items: center;
        }
        .input-wrap.active { background: linear-gradient(90deg, var(--teal), var(--phosphor)); }
        #userInput {
            flex: 1; padding: 12px 14px; font-size: 14px;
            border: none; border-radius: 6.5px; outline: none;
            background: #0a0d11; color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 46px;
        }
        #userInput::placeholder { color: var(--muted-2); font-size: 13px; }
        .voice-btn {
            background: none; border: none; color: var(--muted);
            font-size: 19px; cursor: pointer; padding: 0 8px;
            transition: color 0.2s; -webkit-tap-highlight-color: transparent;
            display: flex; align-items: center; justify-content: center; height: 46px;
        }
        .voice-btn:hover, .voice-btn.listening { color: var(--teal); }

        #sendBtn {
            width: 46px; height: 46px; border-radius: 8px; border: none; cursor: pointer;
            background: linear-gradient(135deg, var(--phosphor), #ff9a3d);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 18px rgba(255, 181, 69, 0.28);
            transition: transform .15s ease, box-shadow .2s ease;
            flex: none; -webkit-tap-highlight-color: transparent;
        }
        #sendBtn:active { transform: scale(0.92); }
        #sendBtn svg { width: 17px; height: 17px; }

        .scroll-bottom {
            position: absolute; bottom: 108px; right: 20px; z-index: 10;
            background: rgba(21, 26, 33, 0.85);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--teal-dim);
            border-radius: 8px; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--teal); font-size: 17px;
            transition: all 0.25s ease; opacity: 0; pointer-events: none;
            -webkit-tap-highlight-color: transparent;
        }
        .scroll-bottom.visible { opacity: 1; pointer-events: auto; }
        .scroll-bottom:hover { background: rgba(91, 224, 230, 0.12); }

        .toast {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(11, 14, 18, 0.92);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--line);
            border-radius: 8px; padding: 9px 18px;
            color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
            z-index: 2000; transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0; pointer-events: none; white-space: nowrap; max-width: 90%;
        }
        .toast.show { opacity: 1; pointer-events: auto; }

        @media (prefers-reduced-motion: reduce) {
            .brand-mark::after, .dot-live, .typing span { animation: none !important; }
        }

        @media (max-width: 820px) {
            .chat-header { padding: 8px 12px; min-height: 48px; }
            #messages { padding: 10px 10px 4px 10px; gap: 12px; }
            .row { max-width: 92%; }
            .bubble { font-size: 13.5px; padding: 9px 12px; }
            .who-sub { font-size: 10px; }
            .msg-count { font-size: 9.5px; padding: 3px 8px; }
            #chipRow { padding: 4px 12px 8px 12px; min-height: 40px; gap: 6px; }
            .chip { font-size: 11px; padding: 5px 10px; }
            .input-bar { padding: 6px 12px calc(6px + var(--safe-bottom)); gap: 8px; }
            #userInput { font-size: 13px; padding: 10px 12px; min-height: 40px; }
            #sendBtn { width: 40px; height: 40px; border-radius: 7px; }
            #sendBtn svg { width: 15px; height: 15px; }
            .voice-btn { height: 40px; font-size: 17px; padding: 0 6px; }
            .scroll-bottom { bottom: 98px; right: 14px; width: 33px; height: 33px; font-size: 15px; }
        }
        @media (max-width: 420px) {
            .bubble { font-size: 12.5px; padding: 8px 10px; }
            .row .avatar-mini { width: 23px; height: 23px; font-size: 10px; }
            .row { max-width: 96%; gap: 6px; }
            #messages { padding: 8px 6px 2px 6px; gap: 10px; }
            .chip { font-size: 10px; padding: 4px 9px; }
            .input-bar { padding: 4px 8px calc(4px + var(--safe-bottom)); gap: 6px; }
            #userInput { font-size: 12px; padding: 8px 10px; min-height: 34px; }
            #sendBtn { width: 34px; height: 34px; border-radius: 6px; }
            #sendBtn svg { width: 13px; height: 13px; }
            .voice-btn { height: 34px; font-size: 15px; padding: 0 4px; }
            .msg-count { font-size: 8.5px; padding: 2px 6px; }
            .scroll-bottom { bottom: 80px; right: 10px; width: 30px; height: 30px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <canvas id="neuralCanvas"></canvas>
    <div class="toast" id="toast"></div>
    <div class="drawer-overlay" id="drawerOverlay"></div>

    <div class="drawer-content" id="drawerContent">
        <button class="drawer-close" id="drawerClose">✕</button>
        <div class="brand">

        function detectIntent(raw) {
            const msg = " " + raw.toLowerCase().trim() + " ";
            let best = null, bestScore = 0;
            for (const [tag, words] of Object.entries(KEYWORDS)) {
                let score = 0;
                for (const w of words) {
                    if (msg.includes(w.toLowerCase())) score += w.trim().split(" ").length;
                }
                if (score > bestScore) { bestScore = score; best = tag; }
            }
            return bestScore > 0 ? best : "unknown";
        }

        function getFallbackResponse(raw) {
            const tag = detectIntent(raw);
            const pool = INTENTS[tag] || INTENTS.unknown;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        const messagesEl = document.getElementById('messages');

        window.isThinking = false;

        function timeNow() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.innerText = str;
            return d.innerHTML;
        }

        function renderMarkdown(text) {
            let html = text
                .replace(/```([\s\S]*?)```/g, (match, code) => {
                    const lang = code.match(/^(\w+)\n/);
                    let language = 'plaintext';
                    let codeContent = code;
                    if (lang) { language = lang[1]; codeContent = code.slice(lang[0].length); }
                    const highlighted = hljs.highlight(codeContent, { language }).value;
                    return `<pre><code class="hljs">${highlighted}</code></pre>`;
                })
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^\- (.*?)$/gm, '<li>$1</li>')
                .replace(/^\d+\. (.*?)$/gm, '<li>$1</li>')
                .replace(/\n/g, '<br>');
            html = html.replace(/(<li>.*?<\/li>)/gs, '<ul>$1</ul>');
            html = html.replace(/<ul><ul>/g, '<ul>').replace(/<\/ul><\/ul>/g, '</ul>');
            return html;
        }

        function addMessage(text, sender, isHistory = false) {
            const row = document.createElement('div');
            row.className = 'row ' + sender;
            const avatar = sender === 'bot' ? 'Ψ' : '●';
            const name = sender === 'bot' ? 'PSYCHON' : 'You';
            const time = timeNow();
            let bubbleContent = sender === 'bot' ? renderMarkdown(text) : escapeHtml(text);
            let actionsHtml = '';
            if (sender === 'bot') {
                actionsHtml = `
              <span class="msg-actions">
                <button class="copy-btn" title="Copy">⧉</button>
                <button class="regenerate-btn" title="Regenerate">↻</button>
              </span>`;
            }
            row.innerHTML = `
            <div class="avatar-mini">${avatar}</div>
            <div>
              <div class="bubble">${bubbleContent}</div>
              <div class="meta">
                <span>${name} · ${time}</span>
                ${actionsHtml}
              </div>
            </div>`;
            messagesEl.appendChild(row);

            if (sender === 'bot') {
                const copyBtn = row.querySelector('.copy-btn');
                const regenBtn = row.querySelector('.regenerate-btn');
                if (copyBtn) {
                    copyBtn.addEventListener('click', () => {
                        navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard')).catch(() => {});
                    });
                }
                if (regenBtn) {
                    regenBtn.addEventListener('click', () => {
                        const userMessages = [...document.querySelectorAll('.row.user')];
                        if (userMessages.length > 0) {
                            const lastUser = userMessages[userMessages.length - 1];
                            const userText = lastUser.querySelector('.bubble').textContent;
                            inputEl.value = userText;
                            sendMessage();
                        }
                    });
                }
            }

            messagesEl.scrollTop = messagesEl.scrollHeight;
            if (!isHistory) {
                history.push({ sender, text, time: time });
                saveHistory();
            }
            updateMsgCount();
            checkScroll();
        }

            window.isThinking = true;

        function updateMsgCount() {
            const count = history.filter(h => h.sender === 'bot').length;
            exchangeCount = count;
            msgCountEl.textContent = count + (count === 1 ? ' exchange' : ' exchanges');

        function checkScroll() {
            const threshold = 100;
            const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < threshold;
            scrollBottom.classList.toggle('visible', !atBottom);

        /* ============================================================

           ============================================================ */
        function saveHistory() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch (e) {}

        function loadHistory() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (parsed.length > 0) {
                        parsed.forEach(item => addMessage(item.text, item.sender, true));
                        updateMsgCount();
                        return true;
                    }

            return false;
        }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;

            recognition.start();

        /* ============================================================

           ============================================================ */
        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            inputEl.value = '';
            inputWrap.classList.remove('active');
            showTyping();
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const reply = data.reply || "Signal unclear — I didn't catch that.";
                hideTyping();
                addMessage(reply, 'bot');
                refreshChips();
            } catch (error) {
                console.warn('API fallback:', error);
                const fallbackReply = getFallbackResponse(text);
                hideTyping();
                addMessage(fallbackReply, 'bot');
                refreshChips();
                showToast('Running on local knowledge (API unreachable)');
            }
        }

        inputEl.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

            a.download = 'psychon-chat.txt';
            a.click();
            URL.revokeObjectURL(url);

        /* ============================================================
           BACKGROUND SIGNAL FIELD — faint synaptic drift, two tones only
           ============================================================ */
        (function neuralBackground() {
            const canvas = document.getElementById('neuralCanvas');
            const ctx = canvas.getContext('2d');
            let w, h, nodes = [];
            const COLORS = ['#5be0e6', '#ffb545'];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const NODE_COUNT = Math.min(46, Math.floor((w * h) / 34000));
            for (let i = 0; i < NODE_COUNT; i++) {
                nodes.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.22,
                    vy: (Math.random() - 0.5) * 0.22,
                    r: Math.random() * 1.3 + 0.6,
                    c: COLORS[Math.floor(Math.random() * COLORS.length)]
                });
            }

            function tick() {
                ctx.clearRect(0, 0, w, h);
                for (const n of nodes) {
                    n.x += n.vx; n.y += n.vy;
                    if (n.x < 0 || n.x > w) n.vx *= -1;
                    if (n.y < 0 || n.y > h) n.vy *= -1;
                }
                for (let i = 0; i < nodes.length; i++) {
                    for (let j = i + 1; j < nodes.length; j++) {
                        const a = nodes[i], b = nodes[j];
                        const dx = a.x - b.x, dy = a.y - b.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 130) {
                            ctx.strokeStyle = `rgba(91,224,230,${0.10 * (1 - dist / 130)})`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath();
                            ctx.moveTo(a.x, a.y);
                            ctx.lineTo(b.x, b.y);
                            ctx.stroke();
                        }
                    }
                }
                for (const n of nodes) {
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                    ctx.fillStyle = n.c;
                    ctx.globalAlpha = 0.6;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                requestAnimationFrame(tick);
            }
            tick();
        })();

        /* ============================================================
           SIGNATURE ELEMENT — live thought-waveform in the header.
           Idle: a slow, calm sine. Thinking: amplitude & noise rise.
           ============================================================ */
        (function pulseWaveform() {
            const canvas = document.getElementById('pulseCanvas');
            const ctx = canvas.getContext('2d');
            let w, h, t = 0;

            function resize() {
                const rect = canvas.parentElement.getBoundingClientRect();
                w = canvas.width = rect.width;
                h = canvas.height = rect.height;
            }
            window.addEventListener('resize', resize);
            resize();

            function draw() {
                ctx.clearRect(0, 0, w, h);
                const thinking = window.isThinking;
                const baseAmp = thinking ? h * 0.16 : h * 0.055;
                const speed = thinking ? 0.14 : 0.045;
                const noise = thinking ? 0.5 : 0.08;
                t += speed;

                ctx.beginPath();
                ctx.lineWidth = 1.3;
                ctx.strokeStyle = thinking ? 'rgba(255,181,69,0.55)' : 'rgba(91,224,230,0.4)';
                const midY = h * 0.62;
                for (let x = 0; x <= w; x += 4) {
                    const n = (Math.sin(x * 0.05 + t * 3) * noise) + (Math.random() - 0.5) * noise * 0.6;
                    const y = midY + Math.sin(x * 0.025 + t) * baseAmp + n * 6;
                    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
                requestAnimationFrame(draw);
            }
            draw();
        })();

        /* ============================================================
           BOOT
           ============================================================ */
        buildTopicRail('topicGrid');
        buildTopicRail('mobileTopicGrid');
        refreshChips();

        const hasHistory = loadHistory();
        if (!hasHistory) { bootGreeting(); } else { updateMsgCount(); }

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                inputEl.focus();
            }
            if (e.key === 'Escape') { inputEl.blur(); closeDrawer(); }
        });
    </script>
</body>
