<style>
  :root{
    --bg-deep:#0a0d1f;
    --bg-deep2:#160b2e;
    --violet:#8b5cf6;
    --violet-soft:#a78bfa;
    --cyan:#22d3ee;
    --pink:#f472b6;
    --text:#eef1fb;
    --muted:#9aa3c7;
    --glass:rgba(255,255,255,0.055);
    --glass-border:rgba(255,255,255,0.10);
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 15% 20%, rgba(139,92,246,0.20), transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(34,211,238,0.16), transparent 45%),
      radial-gradient(circle at 50% 100%, rgba(244,114,182,0.10), transparent 50%),
      linear-gradient(160deg, var(--bg-deep), var(--bg-deep2));
    min-height:100vh;
    overflow:hidden;
    position:relative;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  /* ---------- animated neural canvas background ---------- */
  #neuralCanvas{
    position:fixed; inset:0; width:100%; height:100%;
    z-index:0; opacity:0.55; pointer-events:none;
  }

  /* ---------- layout shell ---------- */
  .shell{
    position:relative; z-index:1;
    height:100vh; width:100%;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .console{
    width:100%; max-width:1180px; height:min(860px, 92vh);
    display:grid; grid-template-columns:300px 1fr; grid-template-rows:100%;
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:24px;
    backdrop-filter:blur(22px) saturate(140%);
    -webkit-backdrop-filter:blur(22px) saturate(140%);
    box-shadow:0 30px 90px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
    overflow:hidden;
  }

  /* ---------- brand rail ---------- */
  .rail{
    padding:30px 26px;
    border-right:1px solid var(--glass-border);
    background:linear-gradient(180deg, rgba(139,92,246,0.10), rgba(34,211,238,0.04));
    display:flex; flex-direction:column;
    gap:26px;
    min-height:0; /* allow this grid item to shrink so its children can scroll */
    overflow:hidden;
  }
  .topic-section{
    display:flex; flex-direction:column;
    flex:1; min-height:0; /* let this section fill remaining rail space */
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:46px; height:46px; border-radius:14px;
    background:conic-gradient(from 180deg, var(--violet), var(--cyan), var(--pink), var(--violet));
    display:flex; align-items:center; justify-content:center;
    position:relative;
    animation:spin 8s linear infinite;
    box-shadow:0 0 26px rgba(139,92,246,0.55);
  }
  .brand-mark::after{
    content:"";
    position:absolute; inset:4px;
    border-radius:10px;
    background:var(--bg-deep);
  }
  .brand-mark svg{ position:relative; z-index:1; width:22px; height:22px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .brand h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:19px; margin:0; letter-spacing:0.5px;
    background:linear-gradient(90deg,#fff,var(--violet-soft));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand span{ display:block; font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px;}

  .status-pill{
    display:inline-flex; align-items:center; gap:8px;
    font-size:12px; color:var(--muted);
    padding:8px 12px; border-radius:999px;
    background:rgba(255,255,255,0.04); border:1px solid var(--glass-border);
    width:fit-content;
  }
  .dot-live{ width:8px; height:8px; border-radius:50%; background:#34d399; box-shadow:0 0 10px #34d399; animation:pulse 1.6s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.8);} }

  .rail-section-title{
    font-size:11px; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted);
    margin:4px 0 2px;
  }
  .topic-grid{ display:flex; flex-direction:column; gap:8px; overflow-y:auto; padding-right:4px; flex:1; min-height:0; }
  .topic-grid::-webkit-scrollbar{ width:5px; }
  .topic-grid::-webkit-scrollbar-thumb{ background:rgba(139,92,246,0.35); border-radius:10px; }
  .topic-btn{
    text-align:left;
    font-family:'Inter',sans-serif;
    font-size:13px; color:var(--text);
    background:rgba(255,255,255,0.03);
    border:1px solid var(--glass-border);
    padding:10px 12px; border-radius:12px;
    cursor:pointer; transition:all .2s ease;
    display:flex; align-items:center; gap:8px;
  }
  .topic-btn:hover{
    background:linear-gradient(90deg, rgba(139,92,246,0.18), rgba(34,211,238,0.10));
    border-color:rgba(139,92,246,0.5);
    transform:translateX(3px);
  }
  .topic-btn .emoji{ font-size:14px; }

  .rail-footer{
    margin-top:auto; display:flex; gap:8px;
  }
  .icon-btn{
    flex:1;
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:10px; border-radius:12px;
    background:rgba(255,255,255,0.04); border:1px solid var(--glass-border);
    color:var(--muted); font-size:12px; cursor:pointer;
    transition:all .2s ease;
  }
  .icon-btn:hover{ color:var(--text); background:rgba(255,255,255,0.09); }

  /* ---------- chat column ---------- */
  .chat-col{ display:flex; flex-direction:column; min-width:0; min-height:0; }
  .chat-header{
    padding:20px 26px;
    border-bottom:1px solid var(--glass-border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .chat-header .who{ display:flex; align-items:center; gap:12px; }
  .avatar-bot{
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg, var(--violet), var(--cyan));
    display:flex; align-items:center; justify-content:center;
    font-size:16px; box-shadow:0 0 16px rgba(139,92,246,0.5);
    position:relative;
  }
  .avatar-bot::after{
    content:""; position:absolute; inset:-3px; border-radius:50%;
    border:1.5px solid rgba(139,92,246,0.5);
    animation:ring 2.2s ease-out infinite;
  }
  @keyframes ring{ 0%{transform:scale(0.9); opacity:0.8;} 100%{transform:scale(1.5); opacity:0;} }
  .who-name{ font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600; }
  .who-sub{ font-size:11.5px; color:var(--muted); }

  .msg-count{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);
    background:rgba(255,255,255,0.04); border:1px solid var(--glass-border);
    padding:6px 10px; border-radius:999px;
  }

  /* ---------- messages ---------- */
  #messages{
    flex:1; overflow-y:auto; padding:24px 26px;
    display:flex; flex-direction:column; gap:16px;
    scroll-behavior:smooth;
  }
  #messages::-webkit-scrollbar{ width:6px; }
  #messages::-webkit-scrollbar-thumb{ background:rgba(139,92,246,0.35); border-radius:10px; }

  .row{ display:flex; gap:10px; max-width:82%; animation:rise .35s ease both; }
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  .row.user{ align-self:flex-end; flex-direction:row-reverse; }
  .row .avatar-mini{
    width:30px; height:30px; border-radius:50%; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:13px;
  }
  .row.bot .avatar-mini{ background:linear-gradient(135deg,var(--violet),var(--cyan)); box-shadow:0 0 10px rgba(139,92,246,0.4); }
  .row.user .avatar-mini{ background:linear-gradient(135deg,var(--pink),var(--violet)); box-shadow:0 0 10px rgba(244,114,182,0.35); }

  .bubble{
    padding:12px 15px; border-radius:16px;
    font-size:14.5px; line-height:1.5;
    position:relative;
  }
  .row.bot .bubble{
    background:rgba(255,255,255,0.055);
    border:1px solid var(--glass-border);
    border-top-left-radius:4px;
  }
  .row.user .bubble{
    background:linear-gradient(135deg, rgba(139,92,246,0.85), rgba(34,211,238,0.65));
    color:#0a0d1f; font-weight:500;
    border-top-right-radius:4px;
  }
  .meta{ font-size:10.5px; color:var(--muted); margin-top:5px; }
  .row.user .meta{ text-align:right; color:rgba(10,13,31,0.6); }

  .typing{ display:flex; gap:4px; padding:14px 15px; }
  .typing span{
    width:6px; height:6px; border-radius:50%;
    background:var(--violet-soft);
    animation:bounce 1.2s infinite;
  }
  .typing span:nth-child(2){ animation-delay:.15s; }
  .typing span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{transform:translateY(0); opacity:.5;} 30%{transform:translateY(-5px); opacity:1;} }

  /* ---------- suggestion chips ---------- */
  #chipRow{
    display:flex; gap:8px; flex-wrap:wrap; padding:0 26px 14px;
  }
  .chip{
    font-size:12.5px; color:var(--violet-soft);
    background:rgba(139,92,246,0.10);
    border:1px solid rgba(139,92,246,0.35);
    padding:7px 13px; border-radius:999px;
    cursor:pointer; transition:all .2s ease; white-space:nowrap;
  }
  .chip:hover{ background:rgba(139,92,246,0.25); transform:translateY(-2px); }

  /* ---------- input bar ---------- */
  .input-bar{
    padding:16px 26px 22px;
    display:flex; gap:10px; align-items:center;
    border-top:1px solid var(--glass-border);
  }
  .input-wrap{
    flex:1; position:relative;
    border-radius:14px; padding:1.5px;
    background:linear-gradient(90deg, rgba(139,92,246,0.35), rgba(34,211,238,0.25));
  }
  .input-wrap.active{
    background:linear-gradient(90deg, var(--violet), var(--cyan), var(--pink));
    background-size:200% 100%;
    animation:gradientMove 3s linear infinite;
  }
  @keyframes gradientMove{ to{ background-position:200% 0; } }
  #userInput{
    width:100%; padding:13px 16px; font-size:14.5px;
    border:none; border-radius:12.5px; outline:none;
    background:#0d1024; color:var(--text); font-family:'Inter',sans-serif;
  }
  #userInput::placeholder{ color:var(--muted); }

  #sendBtn{
    width:48px; height:48px; border-radius:14px; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--violet), var(--cyan));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 22px rgba(139,92,246,0.4);
    transition:transform .15s ease;
    flex:none;
  }
  #sendBtn:hover{ transform:scale(1.06) rotate(-4deg); }
  #sendBtn:active{ transform:scale(0.94); }
  #sendBtn svg{ width:20px; height:20px; }

  /* ---------- responsive ---------- */
  @media (max-width:820px){
    .shell{ padding:0; }
    .console{ grid-template-columns:1fr; border-radius:0; height:100vh; }
    .rail{ display:none; }
  }

  /* subtle scroll fade at top of messages */
  .fade-top{
    position:sticky; top:-24px; height:24px; margin:-24px -26px 0;
    background:linear-gradient(180deg, rgba(10,13,31,0.5), transparent);
    pointer-events:none;
  }
</style>

  "iot": [
    "The Internet of Things is the concept of connecting any device (as long as it has an on/off switch) to the Internet and to other connected devices. It's a giant network of connected things.",

  "keras": [
    "Keras is a high-level neural networks API written in Python, capable of running on top of TensorFlow (and previously Theano, CNTK). It's designed to enable fast experimentation with deep learning models, offering a user-friendly interface.",

  "lstm": [
    "LSTM stands for Long Short-Term Memory. It's a type of recurrent neural network (RNN) designed to learn long-term dependencies and remember information for long periods. LSTMs have gated cells that control the flow of information, making them ideal for sequence data like text, speech, and time series. I am built using LSTM to understand conversational context.",
    "LSTM means the network can remember information for a long time and has mechanisms to decide what to remember and what to forget – perfect for language tasks.",
    "LSTM is a core technology in modern deep learning for sequence modelling. It's used in machine translation, speech recognition, and chatbots like me. Its ability to remember long-term context makes it invaluable.",
    "LSTM stands for Long Short-Term Memory. It reflects its ability to bridge long time lags while avoiding the vanishing gradient problem.",
    "LSTM works with a cell state and three gates. The forget gate discards irrelevant info, the input gate adds new info, and the output gate produces the final output based on the cell state.",
    "The full form of LSTM is Long Short-Term Memory.",
    "LSTM is an RNN variant that uses three gates – input, forget, and output – and a cell state to manage memory. This allows it to keep relevant information across many time steps, which is crucial for NLP and time-series forecasting.",
    "LSTM is used because it handles long-range dependencies in data. For language and sequence tasks, it maintains context over many steps, outperforming vanilla RNNs.",
    "LSTM is an advanced neural network that has become a cornerstone of AI for sequence processing, used in Google search, voice assistants, and my own ability to converse.",
    "LSTM (Long Short-Term Memory) is a special RNN with gated cells that can retain or forget information, solving the vanishing gradient problem and learning long sequences effectively.",
    "LSTM basics involve understanding its three gates, the cell state, and how they control information flow. It's a key architecture for sequence modelling."
  ],
  "machine_learning": [

    "Unsupervised learning is a type of ML where the model is given unlabeled data and must find hidden patterns or groupings, like clustering customers by behaviour.",

    "Machine Learning is the study of algorithms that allow computers to learn from and make predictions based on data. It's one of the most popular tools in modern AI.",
    "ML stands for Machine Learning. It's a branch of AI that focuses on building systems that learn from data. Unlike traditional programming, ML algorithms discover patterns on their own.",

/* ============================================================
   2. FALLBACK INTENT MATCHING (used only if API fails)
   ============================================================ */
function detectIntent(raw){
  const msg = " " + raw.toLowerCase().trim() + " ";
  let best = null, bestScore = 0;
  for(const [tag, words] of Object.entries(KEYWORDS)){
    let score = 0;
    for(const w of words){
      if(msg.includes(w.toLowerCase())) score += w.trim().split(" ").length;
    }
    if(score > bestScore){ bestScore = score; best = tag; }
  }
  return bestScore > 0 ? best : "unknown";
}

function getFallbackResponse(raw){
  const tag = detectIntent(raw);
  const pool = INTENTS[tag] || INTENTS.unknown;
  return pool[Math.floor(Math.random() * pool.length)];
}

function timeNow(){
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMessage(text, sender){
  const row = document.createElement('div');
  row.className = 'row ' + sender;
  row.innerHTML = `

      <div class="bubble">${escapeHtml(text)}</div>
      <div class="meta">${sender === 'bot' ? 'PSYCHON' : 'You'} · ${timeNow()}</div>
    </div>`;
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  history.push({sender, text, time: timeNow()});
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.innerText = str;
  return d.innerHTML;
}

/* ============================================================
   4. SEND / RECEIVE FLOW – now uses the LIVE API
   ============================================================ */
async function sendMessage(){
  const text = inputEl.value.trim();
  if(!text) return;
  addMessage(text, 'user');
  inputEl.value = '';
  inputWrap.classList.remove('active');

  showTyping();

  try {
    // Call the live Hugging Face backend
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    const data = await response.json();
    const reply = data.reply || "Sorry, I didn't get that.";

    hideTyping();
    addMessage(reply, 'bot');
    exchangeCount++;
    msgCountEl.textContent = exchangeCount + (exchangeCount === 1 ? ' exchange' : ' exchanges');
    refreshChips();

  } catch (error) {
    console.error('API call failed, using fallback:', error);
    // Fallback to local rule-based response
    const fallbackReply = getFallbackResponse(text);
    hideTyping();
    addMessage(fallbackReply, 'bot');
    exchangeCount++;
    msgCountEl.textContent = exchangeCount + (exchangeCount === 1 ? ' exchange' : ' exchanges');
    refreshChips();
  }
}

  a.href = url; a.download = 'psychon-chat.txt'; a.click();

});

/* ============================================================
   5. NEURAL NETWORK BACKGROUND ANIMATION
   ============================================================ */
(function neuralBackground(){
  const canvas = document.getElementById('neuralCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, nodes = [];
  const COLORS = ['#8b5cf6', '#22d3ee', '#f472b6'];

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const NODE_COUNT = Math.min(70, Math.floor((w * h) / 22000));
  for(let i = 0; i < NODE_COUNT; i++){
    nodes.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      r: Math.random() * 1.6 + 0.8,
      c: COLORS[Math.floor(Math.random() * COLORS.length)]
    });
  }

  function tick(){
    ctx.clearRect(0, 0, w, h);
    for(const n of nodes){
      n.x += n.vx; n.y += n.vy;
      if(n.x < 0 || n.x > w) n.vx *= -1;
      if(n.y < 0 || n.y > h) n.vy *= -1;
    }
    for(let i = 0; i < nodes.length; i++){
      for(let j = i + 1; j < nodes.length; j++){
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if(dist < 140){
          ctx.strokeStyle = `rgba(139,92,246,${0.14 * (1 - dist / 140)})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }
    for(const n of nodes){
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = n.c;
      ctx.globalAlpha = 0.75;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    requestAnimationFrame(tick);
  }
  tick();
})();
